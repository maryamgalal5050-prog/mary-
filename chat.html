    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;

            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            max-width: 420px;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .chat-header {
            background: linear-gradient(135deg, #0d1535 0%, #0a0e27 100%);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(91,156,255,0.2);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: rgba(255,255,255,0.08);
            border: none; border-radius: 50%; width: 40px; height: 40px;

        .bot-avatar {

            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 100px;

        .messages-area::-webkit-scrollbar-thumb { background: rgba(91,156,255,0.3); border-radius: 2px; }

        .message.user { flex-direction: row-reverse; margin-right: auto; margin-left: 0; align-self: flex-end; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-avatar {
            width: 36px; height: 36px; border-radius: 50%;

            border-radius: 18px;
            line-height: 1.7;

            max-width: 100%;
            word-wrap: break-word;

            border-bottom-right-radius: 4px;
            color: #e8eaf6;

            color: white;
            text-align: right;

    </style>

    // ===================================================
    // MATCHING ENGINE
    // ===================================================
    function normalizeText(text) {
        return text.toLowerCase()
            .replace(/[أإآا]/g, 'ا')
            .replace(/[ةه]/g, 'ه')
            .replace(/[يى]/g, 'ي')
            .replace(/[ؤو]/g, 'و')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function findBestMatch(userInput) {
        const input = normalizeText(userInput);
        let bestMatch = null;
        let bestScore = 0;

        for (const entry of KNOWLEDGE_BASE) {
            let score = 0;
            // Check variations
            if (entry.variations) {
                for (const variation of entry.variations) {
                    const normalizedVar = normalizeText(variation);
                    if (input.includes(normalizedVar) || normalizedVar.includes(input)) {
                        score += 15;
                    }
                }
            }
            // Check keywords
            for (const keyword of entry.keywords) {
                const normalizedKw = normalizeText(keyword);
                if (input.includes(normalizedKw)) {
                    score += 5;
                }
            }
            if (score > bestScore) {
                bestScore = score;
                bestMatch = entry;
            }
        }
        return bestScore >= 2 ? bestMatch : null;
    }

    // ===================================================
    // CHAT LOGIC
    // ===================================================
    const messagesArea = document.getElementById('messagesArea');
    let isTyping = false;

    function renderMarkdown(text) {
        let html = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        
        // Add department buttons if needed
        if (text.includes('اختر القسم اللي عايز تعرف مواده')) {
            html += `<div class="dept-buttons">
                        <div class="dept-btn" onclick="sendSuggestion('مواد قسم تربية فنية')">🎨 تربية فنية</div>
                        <div class="dept-btn" onclick="sendSuggestion('مواد قسم تربية موسيقية')">🎵 تربية موسيقية</div>
                        <div class="dept-btn" onclick="sendSuggestion('مواد قسم إعلام تربوي')">🎤 إعلام تربوي</div>
                        <div class="dept-btn" onclick="sendSuggestion('مواد قسم تكنولوجيا تعليم')">💻 تكنولوجيا تعليم</div>
                        <div class="dept-btn" onclick="sendSuggestion('مواد قسم اقتصاد منزلي')">🏠 اقتصاد منزلي</div>
                        <div class="dept-btn" onclick="sendSuggestion('مواد قسم علوم تربوية')">📖 علوم تربوية</div>
                    </div>`;
        }
        return html;
    }

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = isUser ? '👤' : '🎓';
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        if (isUser) bubble.textContent = text;
        else bubble.innerHTML = renderMarkdown(text);
        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        messagesArea.appendChild(msgDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="msg-avatar">🎓</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
        messagesArea.appendChild(typingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function hideTyping() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || isTyping) return;
        addMessage(text, true);
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('sendBtn').disabled = true;
        isTyping = true;
        showTyping();
        setTimeout(() => {
            hideTyping();
            const match = findBestMatch(text);
            if (match) {
                addMessage(match.answer, false);
            } else {
                addMessage(`😊 آسف، مش لاقي إجابة دقيقة حالياً.

ممكن تسأل عن:
🏛️ الأقسام
📚 مواد أي قسم (اكتب "مواد قسم" واسم القسم)
📋 نظام الساعات المعتمدة
🎓 شروط التخرج
🪪 الكارنيه
⚠️ قواعد الغياب
💻 مشاكل المنصة
🤝 اتحاد الطلاب

أو قولي "أنا جديدة" عشان أقولك كل حاجة عن الكلية!`, false);
            }
            document.getElementById('sendBtn').disabled = false;
            isTyping = false;
        }, 600);
    }

    function sendSuggestion(text) {
        document.getElementById('msgInput').value = text;
        sendMessage();
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

اكتب سؤالك أو اختار من الاقتراحات ⬇️`, false);
        }, 300);
    });
